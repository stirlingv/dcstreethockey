{% extends "admin/change_form.html" %}
{% load i18n %}

{% block object-tools-items %}
  {% if not add %}
  <li>
    <a href="{% url 'admin:leagues_pendingplayerphoto_approve_single' original.pk %}"
       style="background:#2e7d32;color:#fff;border-radius:4px;padding:6px 14px;
              font-weight:600;text-decoration:none;display:inline-block;">
      Approve
    </a>
  </li>
  <li>
    <a href="{% url 'admin:leagues_pendingplayerphoto_reject_single' original.pk %}"
       onclick="return confirm('Permanently delete this photo?')"
       style="background:#c62828;color:#fff;border-radius:4px;padding:6px 14px;
              font-weight:600;text-decoration:none;display:inline-block;">
      Reject
    </a>
  </li>
  {% endif %}
  {{ block.super }}
{% endblock %}
