{% extends 'core/base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'assets/css/schedule.css' %}">
{% endblock %}

{% block content %}
<div id="content-wrapper" class="schedule">
	<div id="content">
		<div class="container">
            <div class="title">
                Scores
            </div>
            <div class="pill-group">
                <div class="pill-item {% if active_division == 0 %}activeoption{% endif %}"
                     onclick="handleDivision('{% url "scores" %}')">All</div>
                {% for division in divisions %}
                    <div class="pill-item {% if division.division == active_division %}activeoption{% endif %}"
                         onclick="handleDivision('{% url "scores" division.division %}')">
                        {{division}}
                    </div>
                {% endfor %}
            </div>
            {% include 'partials/scores.html' %}
        </div>
	</div>
</div>

<script type="text/javascript">
    function toggleTable(id) {
        var stats = document.getElementById("stats-"+id);
				var showstats = stats.style.display == "block";
        stats.style.display = showstats ? "none" : "block";
				document.getElementById("ex-"+id).style.display == showstats ? "block" : "none";
    }
		function handleDivision(dest){
	  	window.location = dest;
	  }
</script>
{% endblock %}
